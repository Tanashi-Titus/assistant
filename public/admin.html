<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Admin — Thêm User</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
    h1 { font-size: 22px; margin-bottom: 24px; }
    label { display: block; margin-bottom: 4px; font-size: 14px; color: #555; }
    input { width: 100%; padding: 10px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #000; color: #fff; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
    button:hover { background: #333; }
    .result { margin-top: 24px; padding: 16px; background: #f5f5f5; border-radius: 8px; display: none; }
    .result h3 { margin: 0 0 12px; }
    .result p { margin: 6px 0; font-size: 14px; }
    .copy-btn { background: #fff; border: 1px solid #ddd; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-left: 8px; }
    .error { color: red; margin-top: 12px; }
    .divider { border: none; border-top: 1px solid #eee; margin: 20px 0; }
  </style>
</head>
<body>
  <h1>➕ Thêm User mới</h1>

  <label>Admin Key *</label>
  <input type="password" id="admin_key" placeholder="Nhập admin key">

  <hr class="divider">

  <label>Tên Giám đốc *</label>
  <input type="text" id="name" placeholder="Nguyễn Văn A">

  <label>Lark App ID</label>
  <input type="text" id="lark_app_id" placeholder="cli_xxxxxxxx">

  <label>Lark App Secret</label>
  <input type="password" id="lark_app_secret" placeholder="Lark App Secret">

  <label>Google Client ID</label>
  <input type="text" id="google_client_id" placeholder="xxxxxx.apps.googleusercontent.com">

  <label>Google Client Secret</label>
  <input type="password" id="google_client_secret" placeholder="GOCSPX-xxxxxxxx">

  <button onclick="createUser()">Tạo User</button>
  <p class="error" id="error"></p>

  <div class="result" id="result">
    <h3>✅ Tạo thành công!</h3>
    <p><b>Tên:</b> <span id="r_name"></span></p>
    <p><b>User ID:</b> <span id="r_uid"></span></p>
    <p>
      <b>API Key:</b> <span id="r_key"></span>
      <button class="copy-btn" onclick="copy('r_key')">Copy</button>
    </p>
    <p>
      <b>Setup URL:</b> <a id="r_url" href="#" target="_blank">Mở link</a>
      <button class="copy-btn" onclick="copyText(document.getElementById('r_url').href)">Copy</button>
    </p>
  </div>

  <script>
    async function createUser() {
      document.getElementById("error").textContent = "";
      document.getElementById("result").style.display = "none";

      const body = {
        name: document.getElementById("name").value,
        lark_app_id: document.getElementById("lark_app_id").value,
        lark_app_secret: document.getElementById("lark_app_secret").value,
        google_client_id: document.getElementById("google_client_id").value,
        google_client_secret: document.getElementById("google_client_secret").value,
      };

      if (!body.name) {
        document.getElementById("error").textContent = "Vui lòng nhập tên.";
        return;
      }

      const res = await fetch("/api/admin/create", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-admin-key": document.getElementById("admin_key").value,
        },
        body: JSON.stringify(body),
      });

      const data = await res.json();
      if (!res.ok) {
        document.getElementById("error").textContent = data.error;
        return;
      }

      document.getElementById("r_name").textContent = data.name;
      document.getElementById("r_uid").textContent = data.user_id;
      document.getElementById("r_key").textContent = data.api_key;
      document.getElementById("r_url").href = data.setup_url;
      document.getElementById("r_url").textContent = data.setup_url;
      document.getElementById("result").style.display = "block";
    }

    function copy(id) {
      copyText(document.getElementById(id).textContent);
    }
    function copyText(text) {
      navigator.clipboard.writeText(text);
    }
  </script>
</body>
</html>
