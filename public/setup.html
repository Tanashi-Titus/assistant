<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Setup — Kết nối tài khoản</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; max-width: 480px; margin: 60px auto; padding: 0 20px; }
    h1 { font-size: 22px; margin-bottom: 6px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 32px; }
    .card { border: 1px solid #eee; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .card-header img { width: 32px; height: 32px; }
    .card-header h2 { font-size: 16px; margin: 0; }
    .status { font-size: 13px; padding: 4px 10px; border-radius: 20px; font-weight: 500; }
    .status.connected { background: #e6f4ea; color: #2d7a3a; }
    .status.pending { background: #fff3e0; color: #e65100; }
    .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; text-align: center; text-decoration: none; font-weight: 500; }
    .btn-lark { background: #00b0f0; color: #fff; }
    .btn-google { background: #4285f4; color: #fff; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .loading { text-align: center; color: #999; padding: 40px 0; }
  </style>
</head>
<body>
  <h1>🔗 Kết nối tài khoản</h1>
  <p class="subtitle" id="greeting">Đang tải...</p>

  <div id="content" style="display:none">
    <!-- Lark Card -->
    <div class="card">
      <div class="card-header">
        <div style="width:32px;height:32px;background:#00b0f0;border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:14px">L</div>
        <h2>Lark Calendar</h2>
        <span class="status" id="lark_status">Chưa kết nối</span>
      </div>
      <button class="btn btn-lark" id="btn_lark" onclick="connectLark()">
        🔵 Kết nối Lark
      </button>
    </div>

    <!-- Google Card -->
    <div class="card">
      <div class="card-header">
        <div style="width:32px;height:32px;background:#4285f4;border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:14px">G</div>
        <h2>Google Calendar</h2>
        <span class="status" id="google_status">Chưa kết nối</span>
      </div>
      <button class="btn btn-google" id="btn_google" onclick="connectGoogle()">
        🔴 Kết nối Google
      </button>
    </div>
  </div>

  <p class="loading" id="loading">Đang tải thông tin...</p>

  <script>
    const uid = new URLSearchParams(window.location.search).get("uid");
    const BASE = "";

    async function loadStatus() {
      if (!uid) {
        document.getElementById("loading").textContent = "❌ Thiếu uid trong URL.";
        return;
      }

      const res = await fetch(`/api/auth/status?uid=${uid}`);
      const data = await res.json();

      if (!res.ok) {
        document.getElementById("loading").textContent = "❌ User không tồn tại.";
        return;
      }

      document.getElementById("greeting").textContent = `Xin chào, ${data.name} 👋`;
      document.getElementById("loading").style.display = "none";
      document.getElementById("content").style.display = "block";

      // Lark status
      if (data.lark_connected) {
        document.getElementById("lark_status").textContent = "✅ Đã kết nối";
        document.getElementById("lark_status").className = "status connected";
        document.getElementById("btn_lark").textContent = "🔄 Kết nối lại";
      } else {
        document.getElementById("lark_status").textContent = "⏳ Chưa kết nối";
        document.getElementById("lark_status").className = "status pending";
      }

      // Google status
      if (data.google_connected) {
        document.getElementById("google_status").textContent = "✅ Đã kết nối";
        document.getElementById("google_status").className = "status connected";
        document.getElementById("btn_google").textContent = "🔄 Kết nối lại";
      } else {
        document.getElementById("google_status").textContent = "⏳ Chưa kết nối";
        document.getElementById("google_status").className = "status pending";
      }
    }

    async function connectLark() {
      const res = await fetch(`/api/auth/init?uid=${uid}&service=lark`);
      const data = await res.json();
      if (data.url) window.location.href = data.url;
      else alert("Lỗi: " + (data.error || "Không lấy được URL"));
    }

    async function connectGoogle() {
      const res = await fetch(`/api/auth/init?uid=${uid}&service=google`);
      const data = await res.json();
      if (data.url) window.location.href = data.url;
      else alert("Lỗi: " + (data.error || "Không lấy được URL"));
    }

    loadStatus();
  </script>
</body>
</html>
