<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Kết nối thành công</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 60px auto; padding: 0 20px; text-align: center; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 32px; }
    .api-box { background: #f5f5f5; border-radius: 10px; padding: 20px; text-align: left; margin-bottom: 24px; }
    .api-box label { font-size: 12px; color: #999; display: block; margin-bottom: 4px; }
    .api-box .value { font-size: 15px; font-weight: 600; word-break: break-all; }
    .copy-btn { margin-top: 10px; padding: 8px 16px; background: #000; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .btn-back { display: inline-block; margin-top: 8px; padding: 12px 24px; background: #f0f0f0; border-radius: 8px; text-decoration: none; color: #333; font-size: 14px; }
  </style>
</head>
<body>
  <div class="icon">✅</div>
  <h1 id="title">Kết nối thành công!</h1>
  <p id="subtitle">Tài khoản đã được liên kết.</p>

  <div class="api-box" id="api_box" style="display:none">
    <label>API Key của bạn (paste vào GPT)</label>
    <div class="value" id="api_key"></div>
    <button class="copy-btn" onclick="copyKey()">📋 Copy API Key</button>
  </div>

  <a id="btn_back" href="#" class="btn-back">← Quay lại setup</a>

  <script>
    const params = new URLSearchParams(window.location.search);
    const uid = params.get("uid");
    const service = params.get("service");

    if (service === "lark") {
      document.getElementById("title").textContent = "🔵 Lark đã kết nối!";
      document.getElementById("subtitle").textContent = "Lark Calendar đã được liên kết thành công.";
    } else if (service === "google") {
      document.getElementById("title").textContent = "🔴 Google đã kết nối!";
      document.getElementById("subtitle").textContent = "Google Calendar đã được liên kết thành công.";
    }

    if (uid) {
      document.getElementById("btn_back").href = `/setup.html?uid=${uid}`;

      // Load api_key
      fetch(`/api/auth/status?uid=${uid}`)
        .then(r => r.json())
        .then(data => {
          if (data.api_key) {
            document.getElementById("api_key").textContent = data.api_key;
            document.getElementById("api_box").style.display = "block";
          }
        });
    }

    function copyKey() {
      navigator.clipboard.writeText(document.getElementById("api_key").textContent);
      document.querySelector(".copy-btn").textContent = "✅ Đã copy!";
    }
  </script>
</body>
</html>
